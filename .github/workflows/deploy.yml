name: Deploy to Cloud Run

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  PROJECT_ID: logfox-api-daemon
  REGION: us-central1
  REPOSITORY: governance
  IMAGE: mcp-gcp-governance-protocol
  SERVICE: mcp-gcp-governance-protocol

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required auth inputs
        run: |
          test -n "${{ secrets.GCP_WIF_PROVIDER }}" || (echo "ERROR: Missing secret GCP_WIF_PROVIDER" && exit 1)
          test -n "${{ secrets.GCP_DEPLOYER_SA }}" || (echo "ERROR: Missing secret GCP_DEPLOYER_SA" && exit 1)

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker authentication for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE_URI="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}"
          docker build --tag "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ env.SERVICE }}" \
            --image "${{ env.IMAGE_URI }}" \
            --region "${{ env.REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars "APP_ENV=production,PROJECT_ID=${{ env.PROJECT_ID }},REGION=${{ env.REGION }},SERVICE_NAME=${{ env.SERVICE }}"

      - name: Print service URL
        run: |
          gcloud run services describe "${{ env.SERVICE }}" \
            --region "${{ env.REGION }}" \
            --format "value(status.url)"
